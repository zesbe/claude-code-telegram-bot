name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Python compile check
        run: python -m py_compile cc_tg.py

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Shell syntax (bash -n)
        run: bash -n install.sh

      - name: Shell syntax (POSIX dash -n)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dash
          dash -n install.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          additional_files: "install.sh start.sh send_to_telegram.sh"
        env:
          SHELLCHECK_OPTS: -e SC1091

      - name: Validate JSON templates
        run: |
          python -c "import json; json.load(open('config.example.json'))"
          python -c "import json; json.load(open('providers.example.json'))"
